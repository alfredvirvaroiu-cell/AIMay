services:
  - type: web
    name: event-room-scheduler
    runtime: node
    plan: free
    buildCommand: npm install --omit=dev
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: event-room-scheduler-db
          property: connectionString
databases:
  - name: event-room-scheduler-db
    plan: free
    databaseName: scheduler
    user: scheduler
